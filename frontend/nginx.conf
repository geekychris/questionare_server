server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Hashed JS/CSS bundles are content-addressed — safe to cache forever.
  location /static/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Never cache the entry document; the next deploy ships a new bundle hash
  # and stale index.html would point browsers at the old hash.
  location = /index.html {
    add_header Cache-Control "no-store, must-revalidate";
    expires off;
  }

  location / {
    add_header Cache-Control "no-store, must-revalidate";
    expires off;
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://backend:8080/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
}
