apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: questionare-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: questionare-server/frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: questionare-server
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30006
      protocol: TCP
