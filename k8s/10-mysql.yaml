apiVersion: v1
kind: Secret
metadata:
  name: mysql-credentials
  namespace: questionare-server
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: rootpw
  MYSQL_DATABASE: questionare
  MYSQL_USER: questionare
  MYSQL_PASSWORD: "123456"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: questionare-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8
          ports:
            - containerPort: 3306
              name: mysql
          envFrom:
            - secretRef:
                name: mysql-credentials
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h 127.0.0.1 -u$MYSQL_USER -p$MYSQL_PASSWORD
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: questionare-server
spec:
  type: NodePort
  selector:
    app: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
      nodePort: 30007
      protocol: TCP
